services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - default
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - default
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - VITE_APP_URL=${APP_URL:-http://localhost:5173}
      - BACKEND_PROXY_URL=http://backend:3001
    depends_on:
      - backend
    restart: unless-stopped
